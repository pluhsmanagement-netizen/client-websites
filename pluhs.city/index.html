<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>pluhs / listen</title>
<meta name="description" content="pluhs. music. listen on soundcloud, watch on tiktok, follow on instagram." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #fafaf7;
    --bg-soft: #f2f1ec;
    --ink: #0a0a0a;
    --ink-dim: #6a6a6a;
    --ink-faint: #b8b6b0;
    --accent: #0a0a0a;
    --accent-soft: #2a2a2a;
    --line: rgba(10, 10, 10, 0.1);
    --grain-opacity: 0.03;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* film grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: var(--grain-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* soft radial wash behind everything */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 40%, rgba(10, 10, 10, 0.04) 0%, transparent 65%);
  }

  /* ========== HEADER ========== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 1.5rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 1.8rem;
    letter-spacing: 0;
    color: var(--ink);
    text-decoration: none;
  }

  .header-meta {
    display: flex;
    gap: 2rem;
    align-items: center;
  }
  .header-meta span::before {
    content: '◉';
    color: var(--accent);
    margin-right: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ========== HERO ========== */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 8rem 2rem 4rem;
    z-index: 1;
  }

  .hero-stack {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 1200px;
  }

  /* floating head */
  .head-wrap {
    position: relative;
    width: min(520px, 80vw);
    aspect-ratio: 1;
    margin-bottom: -3rem;
    z-index: 2;
  }

  .head-glow {
    position: absolute;
    inset: -15%;
    background: radial-gradient(circle, rgba(10, 10, 10, 0.18) 0%, transparent 55%);
    filter: blur(50px);
    z-index: -1;
    animation: glowPulse 6s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.08); }
  }

  .head {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: float 6s ease-in-out infinite;
    filter: drop-shadow(0 30px 50px rgba(0, 0, 0, 0.25)) drop-shadow(0 60px 80px rgba(0, 0, 0, 0.15));
    user-select: none;
    -webkit-user-drag: none;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-22px) rotate(1deg); }
  }

  /* big wordmark behind head */
  .wordmark {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(8rem, 22vw, 22rem);
    line-height: 0.85;
    letter-spacing: -0.02em;
    color: var(--ink);
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
  }

  /* tagline strip */
  .tagline {
    position: relative;
    z-index: 3;
    text-align: center;
    margin-top: 3rem;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1.7rem, 3.2vw, 2.4rem);
    line-height: 1.25;
    color: var(--ink);
    max-width: 640px;
    letter-spacing: 0;
  }
  .tagline em {
    color: var(--accent);
    font-style: italic;
    font-weight: 400;
  }

  .sublabel {
    margin-top: 1.75rem;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .sublabel::before, .sublabel::after {
    content: '';
  }

  /* ========== LISTEN SECTION ========== */
  .listen-section {
    position: relative;
    z-index: 1;
    padding: 6rem 2rem 4rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(3rem, 6.5vw, 5rem);
    line-height: 1;
    letter-spacing: -0.015em;
    margin-bottom: 3rem;
    text-transform: none;
  }
  .section-title em {
    font-style: italic;
    font-weight: 300;
    color: var(--accent);
  }

  /* soundcloud embed wrapper */
  .sc-wrap {
    position: relative;
    border: 1px solid var(--line);
    background: var(--bg-soft);
    padding: 1.5rem;
    border-radius: 4px;
    overflow: hidden;
  }
  .sc-wrap::before {
    content: 'SOUNDCLOUD / PLUHS';
    position: absolute;
    top: 0.6rem;
    right: 0.85rem;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    color: var(--ink-faint);
  }
  .sc-wrap iframe {
    width: 100%;
    height: 450px;
    border: none;
    border-radius: 2px;
    display: block;
  }

  /* ========== LINKS GRID ========== */
  .links-section {
    position: relative;
    z-index: 1;
    padding: 4rem 2rem 6rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .links-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-top: 2rem;
  }

  .link-card {
    position: relative;
    border: 1px solid var(--line);
    background: var(--bg-soft);
    padding: 2.5rem 2rem;
    text-decoration: none;
    color: var(--ink);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 2rem;
    min-height: 220px;
  }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 0;
  }

  .link-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
  }
  .link-card:hover::before {
    transform: translateY(0);
  }
  .link-card:hover .link-platform,
  .link-card:hover .link-handle,
  .link-card:hover .link-arrow {
    color: var(--bg);
  }
  .link-card:hover .link-num {
    color: rgba(250, 250, 247, 0.5);
  }

  .link-card > * {
    position: relative;
    z-index: 1;
    transition: color 0.3s ease;
  }

  .link-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .link-num {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
  }
  .link-arrow {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 1.2rem;
    color: var(--ink-dim);
    transform: rotate(-45deg);
    transition: transform 0.4s ease, color 0.3s ease;
  }
  .link-card:hover .link-arrow {
    transform: rotate(0deg);
  }

  .link-platform {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 2.4rem;
    line-height: 1;
    letter-spacing: -0.015em;
    text-transform: none;
    margin-top: auto;
  }

  .link-handle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 0.5rem;
  }

  /* ========== FOOTER ========== */
  footer {
    position: relative;
    z-index: 1;
    padding: 3rem 2rem 2rem;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  footer .foot-mark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-style: italic;
    font-size: 1.1rem;
    letter-spacing: 0;
    color: var(--ink-dim);
    text-transform: none;
  }

  /* ========== MOBILE ========== */
  @media (max-width: 768px) {
    header { padding: 1rem 1.25rem; }
    .header-meta { gap: 1rem; }
    .header-meta span:nth-child(2) { display: none; }

    .hero { padding: 6rem 1.25rem 3rem; }
    .head-wrap { width: min(380px, 85vw); margin-bottom: -1rem; }
    .tagline { font-size: 1.3rem; margin-top: 1.5rem; }
    .sublabel::before, .sublabel::after { display: none; }

    .listen-section, .links-section { padding-left: 1.25rem; padding-right: 1.25rem; }
    .sc-wrap iframe { height: 380px; }

    .links-grid {
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
    .link-card { min-height: 160px; padding: 1.5rem 1.25rem; }
    .link-platform { font-size: 1.8rem; }

    footer {
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem 1.25rem;
    }
  }

  /* entrance animations */
  .reveal {
    opacity: 0;
    transform: translateY(20px);
    animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .reveal.d1 { animation-delay: 0.2s; }
  .reveal.d2 { animation-delay: 0.5s; }
  .reveal.d3 { animation-delay: 0.8s; }
  .reveal.d4 { animation-delay: 1.1s; }

  @keyframes revealUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <a href="#" class="logo">PLUHS</a>
  <div class="header-meta">
    <span>now playing</span>
    <span>atl // 2026</span>
  </div>
</header>

<!-- ========== HERO ========== -->
<section class="hero">
  <div class="hero-stack">
    <div class="wordmark">pluhs</div>

    <div class="head-wrap reveal">
      <div class="head-glow"></div>
      <img src="img/pluhs-head.png" alt="pluhs" class="head" />
    </div>

    <h1 class="tagline reveal d2">
      sound from <em>somewhere</em><br/>
      between the static
    </h1>

    <div class="sublabel reveal d3">Producer // Vocalist // Atlanta</div>
  </div>
</section>

<!-- ========== LISTEN ========== -->
<section class="listen-section">
  <div class="section-label">01 // Latest</div>
  <h2 class="section-title">Press <em>play.</em></h2>

  <div class="sc-wrap">
    <iframe
      allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/pluhs&color=%23222222&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true">
    </iframe>
  </div>
</section>

<!-- ========== LINKS ========== -->
<section class="links-section">
  <div class="section-label">02 // Channels</div>
  <h2 class="section-title">Find me <em>elsewhere.</em></h2>

  <div class="links-grid">

    <a href="https://soundcloud.com/pluhs" target="_blank" rel="noopener" class="link-card">
      <div class="link-top">
        <span class="link-num">001</span>
        <span class="link-arrow">↗</span>
      </div>
      <div>
        <div class="link-platform">SoundCloud</div>
        <div class="link-handle">/pluhs</div>
      </div>
    </a>

    <a href="https://tiktok.com/@pluhs" target="_blank" rel="noopener" class="link-card">
      <div class="link-top">
        <span class="link-num">002</span>
        <span class="link-arrow">↗</span>
      </div>
      <div>
        <div class="link-platform">TikTok</div>
        <div class="link-handle">@pluhs</div>
      </div>
    </a>

    <a href="https://instagram.com/itspluhs" target="_blank" rel="noopener" class="link-card">
      <div class="link-top">
        <span class="link-num">003</span>
        <span class="link-arrow">↗</span>
      </div>
      <div>
        <div class="link-platform">Instagram</div>
        <div class="link-handle">@itspluhs</div>
      </div>
    </a>

  </div>
</section>

<!-- ========== FOOTER ========== -->
<footer>
  <span class="foot-mark">PLUHS © 2026</span>
  <span>all rights // all wrongs</span>
</footer>

</body>
</html>
